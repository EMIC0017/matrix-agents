services:
  zion-core:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: zion
    volumes:
      - ..:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    networks:
      - matrix-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: "1.5"
    depends_on:
      zion-redis:
        condition: service_healthy
      zion-chromadb:
        condition: service_started

  zion-redis:
    image: redis:7-alpine
    container_name: zion-redis
    ports:
      - "6379:6379"
    networks:
      - matrix-network
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  zion-chromadb:
    image: chromadb/chroma:latest
    container_name: zion-chromadb
    ports:
      - "8001:8000"
    networks:
      - matrix-network
    volumes:
      - chroma-data:/chroma/chroma

networks:
  matrix-network:
    driver: bridge

volumes:
  redis-data:
  chroma-data:
